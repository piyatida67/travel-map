<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cyber DustBoy: Quantum Data Visualization</title>
    <style>
        body {
            margin: 0;
            background: #050510;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        .ui-panel {
            position: absolute;
            background: rgba(10, 10, 30, 0.7);
            padding: 20px;
            border: 1px solid #d4af37;
            backdrop-filter: blur(15px);
            border-radius: 12px;
            pointer-events: auto;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }

        .top-left {
            top: 20px;
            left: 20px;
            border-left: 5px solid #d4af37;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            color: #d4af37;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .header p {
            margin: 5px 0 0;
            font-size: 0.7rem;
            opacity: 0.6;
            letter-spacing: 2px;
        }

        .stats {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            padding-bottom: 5px;
        }

        .stat-val {
            color: #00ffcc;
            font-weight: bold;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
        }

        .cyber-btn {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.8rem;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .cyber-btn:hover {
            background: #d4af37;
            color: #000;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050510;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s;
        }

        .loader-ring {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(212, 175, 55, 0.1);
            border-top: 3px solid #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
    <link rel="stylesheet" href="../global-nav.css" />
</head>

<body>

    <div id="loading">
        <div class="loader-ring"></div>
        <p style="color: #d4af37; margin-top: 20px; letter-spacing: 5px;">CYBER CORE BOOTING...</p>
    </div>

    <div class="ui-panel top-left">
        <div class="header">
            <h1>💎 CYBER DUSTBOY</h1>
            <p>CRYSTALLINE TEV DATA ARCHITECTURE</p>
        </div>
        <div class="stats" id="info-panel">
            <div class="stat-item"><span>System:</span> <span class="stat-val">Online</span></div>
            <div class="stat-item"><span>Node Pool:</span> <span class="stat-val" id="node-count">0</span></div>
            <div class="stat-item"><span>Active Thread:</span> <span class="stat-val">Real-time MQTT</span></div>
        </div>
    </div>

    <div class="controls">
        <a href="dustboy-live.html" class="cyber-btn">🌌 SOLAR VIEW</a>
        <a href="travel-3d.html" class="cyber-btn">🚅 DEN-LINER</a>
    </div>

    <!-- MQTT Component -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const nodes = new Map();

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050510, 0.005);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(20, 20, 50);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- Grid & Background ---
        const grid = new THREE.GridHelper(200, 20, 0xd4af37, 0x111122);
        grid.position.y = -10;
        grid.material.opacity = 0.2;
        grid.material.transparent = true;
        scene.add(grid);

        // Core Hub (The "Server")
        const hubGeo = new THREE.OctahedronGeometry(4, 0);
        const hubMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true });
        const hub = new THREE.Mesh(hubGeo, hubMat);
        scene.add(hub);

        const hubGlow = new THREE.Mesh(hubGeo, new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.3 }));
        hubGlow.scale.setScalar(1.2);
        hub.add(hubGlow);

        // --- Data Handling ---
        function getAQIColor(pm25) {
            if (pm25 <= 15) return 0x00ffcc;
            if (pm25 <= 25) return 0xffff00;
            if (pm25 <= 37) return 0xff7e00;
            if (pm25 <= 50) return 0xff3e3e;
            return 0xbf00ff;
        }

        function createNode(id, data) {
            const group = new THREE.Group();

            const color = getAQIColor(data.pm25);
            const geo = new THREE.TetrahedronGeometry(1.5, 0);
            const mat = new THREE.MeshStandardMaterial({
                color: color,
                emissive: color,
                emissiveIntensity: 0.5,
                flatShading: true
            });
            const mesh = new THREE.Mesh(geo, mat);

            // Random position in space
            const angle = Math.random() * Math.PI * 2;
            const dist = 15 + Math.random() * 30;
            group.position.set(Math.cos(angle) * dist, (Math.random() - 0.5) * 40, Math.sin(angle) * dist);

            group.add(mesh);

            // Connection line to Hub
            const lineMat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.3 });
            const lineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0, 0).sub(group.position)]);
            const line = new THREE.Line(lineGeo, lineMat);
            group.add(line);

            scene.add(group);
            nodes.set(id, { group, mesh, data });
            document.getElementById('node-count').innerText = nodes.size;
        }

        const client = mqtt.connect('wss://dustboy-wss-bridge.laris.workers.dev/mqtt');
        client.on('connect', () => {
            client.subscribe('DUSTBOY/+/+/+/status');
            document.getElementById('loading').style.opacity = '0';
            setTimeout(() => document.getElementById('loading').remove(), 1000);
        });

        client.on('message', (topic, message) => {
            try {
                const data = JSON.parse(message.toString());
                const id = topic.split('/')[3];
                if (!nodes.has(id)) {
                    createNode(id, data);
                } else {
                    const n = nodes.get(id);
                    n.data = data;
                    n.mesh.material.color.setHex(getAQIColor(data.pm25));
                }
            } catch (e) { }
        });

        // Sim for empty stream
        setInterval(() => {
            if (nodes.size < 20) {
                createNode('SIM-' + Math.random(), { pm25: Math.random() * 100 });
            }
        }, 1500);

        // --- Animation ---
        function animate() {
            requestAnimationFrame(animate);
            hub.rotation.y += 0.01;
            hub.rotation.z += 0.005;
            hubGlow.scale.setScalar(1.2 + Math.sin(Date.now() * 0.005) * 0.1);

            nodes.forEach(n => {
                n.group.rotation.y += 0.002;
                n.mesh.rotation.x += 0.01;
                n.mesh.rotation.y += 0.01;
            });

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
